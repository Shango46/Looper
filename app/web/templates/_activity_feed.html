{% if not entries %}
<div class="muted" style="text-align:center;padding:40px;">No activity yet.</div>
{% else %}
{% for e in entries %}
<div class="log-entry" style="cursor:pointer;user-select:none;"
     onclick="var d=this.querySelector('.entry-full');d.style.display=d.style.display==='block'?'none':'block'">
  <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;">
    <span style="padding:1px 7px;border-radius:10px;font-size:11px;font-weight:700;background:#3b82f6;color:#fff;flex-shrink:0;">
      {{ e.agent_name }}
    </span>
    <span style="padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600;flex-shrink:0;
      {% if e.role == 'user' %}background:#0ea5e9;color:#fff;
      {% elif e.role == 'assistant' %}background:#16a34a;color:#fff;
      {% elif e.role == 'tool' %}background:#d97706;color:#fff;
      {% else %}background:#6b7280;color:#fff;{% endif %}">
      {{ e.role.replace('_', ' ') }}
    </span>
    <span style="font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text,#e6e8ec);">
      {{ e.content[:180] }}
    </span>
    <span class="muted" style="font-size:11px;flex-shrink:0;">{{ e.created_at | timeago }}</span>
  </div>
  <div class="entry-full" style="display:none;margin-top:8px;">
    <pre class="code" style="white-space:pre-wrap;word-break:break-word;font-size:12px;margin:0;">{{ e.content }}</pre>
  </div>
</div>
{% endfor %}
{% endif %}
