{% extends "base.html" %}
{% block title %}Org Chart — {{ company.name }}{% endblock %}
{% block content %}
<div class="flex-between" style="margin-bottom:16px;">
  <a href="/companies/{{ company.id }}">&larr; Back to {{ company.name }}</a>
  <div class="row" style="gap:8px;align-items:center;flex:none;">
    <span id="save-png-status" class="muted" style="font-size:13px;"></span>
    <button id="save-png-btn" class="secondary" onclick="saveOrgChartPng()" {% if not mermaid_chart %}disabled{% endif %}>
      Save as PNG
    </button>
  </div>
</div>
<h2>{{ company.name }} — Org Chart</h2>

<div class="card" style="overflow:auto;min-height:300px;">
{% if mermaid_chart %}
  <div class="mermaid" style="min-width:600px;">
{{ mermaid_chart }}
  </div>
{% else %}
  <div class="muted">No agents to display.</div>
{% endif %}
</div>

<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: 'neutral',
    flowchart: { useMaxWidth: false, curve: 'linear' }
  });

  async function saveOrgChartPng() {
    const btn = document.getElementById('save-png-btn');
    const status = document.getElementById('save-png-status');
    btn.disabled = true;
    status.textContent = 'Saving…';
    try {
      const resp = await fetch('/companies/{{ company.id }}/orgchart/save-png', { method: 'POST' });
      const data = await resp.json();
      if (!data.ok) throw new Error(data.error || 'Save failed');
      status.textContent = '✓ Saved: ' + data.filename;
    } catch (e) {
      status.textContent = '✗ ' + e.message;
    }
    btn.disabled = false;
  }
</script>
{% endblock %}
