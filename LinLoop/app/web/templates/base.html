<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Looper{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
  <script src="/static/alpine.min.js" defer></script>
</head>
<body>
  <header class="topbar">
    <a href="/" style="font-weight:700;font-size:18px;color:#e6e8ec;">Looper</a>
    <nav>
      <a href="/">Companies</a>
      <a href="/skills/shop">Skill Shop</a>

    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="/static/approvals_watch.js"></script>
</body>
</html>
